<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中獎名單 — 115年尾牙</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B0000;
      --primary-light: #C41E3A;
      --gold: #B8860B;
      --bg-light: #FFF8F0;
      --success: #2E7D32;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-light);
      color: #333; min-height: 100vh;
    }

    header {
      background: var(--primary); color: #fff;
      padding: 1.25rem 1rem; text-align: center;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    header h1 { font-size: clamp(1.1rem, 4vw, 1.5rem); font-weight: 900; }
    .live-dot {
      display: inline-block; width: 8px; height: 8px; background: #4caf50;
      border-radius: 50%; margin-right: 5px;
      animation: blink 1.5s ease-in-out infinite;
    }
    .live-label { font-size: .75rem; opacity: .8; margin-top: .3rem; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

    /* Search */
    .search-wrap { padding: 1rem; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 70px; z-index: 9; }
    .search-box {
      display: flex; gap: .5rem;
      max-width: 600px; margin: 0 auto;
    }
    .search-box input {
      flex: 1; padding: .7rem 1rem; border: 1px solid #ddd; border-radius: 8px;
      font-size: 1rem; font-family: inherit;
    }
    .search-box button {
      padding: .7rem 1.2rem; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;
    }

    /* Content */
    .content { max-width: 700px; margin: 0 auto; padding: 1rem; }

    .prize-section { margin-bottom: 1.5rem; }
    .prize-title {
      background: #fff; border-left: 4px solid var(--primary);
      padding: .75rem 1rem; border-radius: 0 8px 8px 0;
      font-weight: 900; font-size: 1.1rem; color: var(--primary);
      margin-bottom: .5rem;
      box-shadow: 0 2px 6px rgba(0,0,0,.06);
    }
    .prize-title .count { font-size: .8rem; color: #888; font-weight: 400; margin-left: .5rem; }

    .winner-card {
      background: #fff; border-radius: 10px; padding: .85rem 1rem;
      margin-bottom: .5rem; box-shadow: 0 2px 8px rgba(0,0,0,.06);
      display: flex; align-items: center; gap: .75rem;
      transition: background .2s;
    }
    .winner-card.highlight { background: #fff8e1; border: 1px solid #ffd54f; }
    .winner-card.revoked { opacity: .5; }
    .winner-icon { font-size: 1.5rem; flex-shrink: 0; }
    .winner-info { flex: 1; }
    .winner-name { font-weight: 700; font-size: 1rem; }
    .winner-name.revoked-name { text-decoration: line-through; }
    .winner-sub { font-size: .85rem; color: #777; margin-top: .15rem; }
    .revoked-badge {
      background: #f5f5f5; color: #888; padding: .2rem .6rem;
      border-radius: 20px; font-size: .75rem; flex-shrink: 0;
    }

    .pending-card {
      background: #f9f9f9; border: 1px dashed #ddd; border-radius: 10px;
      padding: .75rem 1rem; margin-bottom: .5rem;
      color: #bbb; font-size: .9rem; text-align: center;
    }

    .no-results {
      text-align: center; padding: 3rem 1rem; color: #aaa;
    }
    .no-results .emoji { font-size: 3rem; display: block; margin-bottom: 1rem; }

    .new-badge {
      background: #ff5722; color: #fff; padding: .15rem .5rem;
      border-radius: 20px; font-size: .72rem; margin-left: .5rem;
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: scale(.8); } to { opacity: 1; transform: scale(1); } }

    footer {
      text-align: center; padding: 2rem 1rem;
      font-size: .8rem; color: #ccc;
    }
  </style>
</head>
<body>

<header>
  <h1>🎉 輔仁大學附設醫院 115年尾牙中獎名單</h1>
  <div class="live-label"><span class="live-dot"></span>即時更新中</div>
</header>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="輸入姓名或員工編號查詢" oninput="onSearch()">
    <button onclick="onSearch()">🔍</button>
  </div>
</div>

<div class="content">
  <div id="mainContent">
    <div class="no-results">
      <span class="emoji">⏳</span>載入中…
    </div>
  </div>
</div>

<footer>輔仁大學附設醫院 115年尾牙 | 即時更新</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script>
  let _prizes = [];
  let _results = [];
  let _searchKeyword = '';
  let _newResultIds = new Set();

  async function init() {
    [_prizes, _results] = await Promise.all([
      Store.getPrizes(),
      Store.getResults()
    ]);
    render();

    Store.subscribeResults(async (payload) => {
      if (payload.eventType === 'INSERT') {
        _newResultIds.add(payload.new.id);
        setTimeout(() => { _newResultIds.delete(payload.new.id); render(); }, 5000);
      }
      _results = await Store.getResults();
      render();
    });

    Store.subscribePrizes(async () => {
      _prizes = await Store.getPrizes();
      render();
    });
  }

  function onSearch() {
    _searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
    render();
  }

  function render() {
    const container = document.getElementById('mainContent');
    const activePrizes = _prizes.filter(p => p.active);

    if (activePrizes.length === 0) {
      container.innerHTML = `<div class="no-results"><span class="emoji">🎊</span>抽獎尚未開始，敬請期待！</div>`;
      return;
    }

    if (_searchKeyword) {
      renderSearchResults(container);
      return;
    }

    container.innerHTML = activePrizes.map(prize => {
      const prizeResults = _results
        .filter(r => r.prize_id === prize.id)
        .sort((a, b) => new Date(a.drawn_at) - new Date(b.drawn_at));

      const validCount = prizeResults.filter(r => !r.revoked).length;
      const pending = prize.quantity - validCount;

      const cards = prizeResults.map(r => winnerCard(r)).join('');
      const pendingCards = Array(Math.max(0, pending)).fill(0)
        .map(() => `<div class="pending-card">⏳ 尚未抽出</div>`).join('');

      return `
        <div class="prize-section">
          <div class="prize-title">
            🏆 ${prize.name}
            <span class="count">（${validCount} / ${prize.quantity} 名）</span>
          </div>
          ${cards}${pendingCards}
        </div>
      `;
    }).join('');
  }

  function winnerCard(r) {
    const isNew = _newResultIds.has(r.id);
    const isHighlight = _searchKeyword && (
      r.participant_name.toLowerCase().includes(_searchKeyword) ||
      (r.participant_employee_no || '').toLowerCase().includes(_searchKeyword)
    );
    return `
      <div class="winner-card ${r.revoked ? 'revoked' : ''} ${isHighlight ? 'highlight' : ''}">
        <div class="winner-icon">${r.revoked ? '↩️' : '🎉'}</div>
        <div class="winner-info">
          <div class="winner-name ${r.revoked ? 'revoked-name' : ''}">
            ${r.participant_name}
            ${isNew ? '<span class="new-badge">NEW</span>' : ''}
          </div>
          <div class="winner-sub">
            ${r.participant_dept}
            ${r.participant_employee_no ? ' ‧ ' + r.participant_employee_no : ''}
          </div>
        </div>
        ${r.revoked ? '<span class="revoked-badge">已重抽</span>' : ''}
      </div>
    `;
  }

  function renderSearchResults(container) {
    const matched = _results.filter(r =>
      r.participant_name.toLowerCase().includes(_searchKeyword) ||
      (r.participant_employee_no || '').toLowerCase().includes(_searchKeyword)
    );

    if (matched.length === 0) {
      container.innerHTML = `<div class="no-results"><span class="emoji">🔍</span>查無符合「${_searchKeyword}」的中獎紀錄</div>`;
      return;
    }

    container.innerHTML = matched.map(r => winnerCard(r)).join('');
  }

  init();
</script>
</body>
</html>
