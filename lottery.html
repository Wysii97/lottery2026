<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尾牙抽獎 — 輔仁大學附設醫院</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B0000;
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --bg-dark: #1a0a0a;
      --text-on-dark: #FFE4B5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-on-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Login ─── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: rgba(255,255,255,.07); padding: 2.5rem; border-radius: 16px;
      border: 1px solid rgba(255,215,0,.3); text-align: center; width: 340px;
    }
    .login-box h1 { color: var(--gold); font-size: 1.6rem; margin-bottom: .5rem; }
    .login-box p { color: var(--text-on-dark); font-size: .9rem; margin-bottom: 1.5rem; opacity: .8; }
    .login-box input {
      width: 100%; padding: .85rem; background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,215,0,.4); border-radius: 8px; color: #fff;
      font-size: 1.1rem; text-align: center; letter-spacing: .3em;
      font-family: inherit; margin-bottom: 1rem;
    }
    .login-box button {
      width: 100%; padding: .85rem; background: var(--gold); color: #1a0a0a;
      border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 900;
      cursor: pointer; font-family: inherit;
    }
    .login-box button:hover { background: #ffd000; }
    #loginError { color: #ff6b6b; font-size: .9rem; margin-top: .75rem; }

    /* ─── Header ─── */
    #app { display: none; }
    header {
      text-align: center; padding: 1.5rem 2rem 1rem;
      border-bottom: 1px solid rgba(255,215,0,.15);
    }
    header h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 900; color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,.4);
    }
    header p { font-size: 1rem; opacity: .7; margin-top: .3rem; }

    /* ─── Main layout ─── */
    main { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; padding: 1.5rem 2rem; height: calc(100vh - 120px); }

    /* ─── Left: Draw area ─── */
    .draw-area { display: flex; flex-direction: column; gap: 1.25rem; }

    .prize-selector select {
      width: 100%; padding: .85rem 1rem; background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,215,0,.4); border-radius: 10px; color: var(--gold);
      font-size: 1.2rem; font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .prize-selector select option { background: #2a1010; color: var(--gold); }

    /* ─── Marquee ─── */
    .marquee-wrap {
      flex: 1; background: rgba(255,255,255,.04);
      border: 2px solid rgba(255,215,0,.2); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; min-height: 200px;
    }
    #marqueeText {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900; color: var(--gold);
      text-shadow: 0 0 30px rgba(255,215,0,.6);
      transition: none; user-select: none;
    }
    .marquee-wrap.idle #marqueeText { color: rgba(255,215,0,.3); font-size: 1.5rem; }

    /* ─── Draw Button ─── */
    #drawBtn {
      padding: 1.2rem; font-size: clamp(1.2rem, 2.5vw, 1.8rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold), #ff8c00);
      color: #1a0a0a; border: none; border-radius: 14px; cursor: pointer;
      font-family: inherit; letter-spacing: .05em;
      box-shadow: 0 4px 20px rgba(255,215,0,.3);
      transition: transform .1s, box-shadow .1s;
    }
    #drawBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,215,0,.5); }
    #drawBtn:active:not(:disabled) { transform: translateY(0); }
    #drawBtn:disabled { opacity: .4; cursor: not-allowed; }
    #statusMsg { text-align: center; font-size: .95rem; color: rgba(255,228,181,.7); min-height: 1.4em; }

    /* ─── Right: Results list ─── */
    .results-panel {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,215,0,.15);
      border-radius: 16px; display: flex; flex-direction: column; overflow: hidden;
    }
    .results-panel h2 {
      padding: 1rem 1.25rem; font-size: 1rem; color: var(--gold);
      border-bottom: 1px solid rgba(255,215,0,.15); flex-shrink: 0;
    }
    .results-list { flex: 1; overflow-y: auto; padding: .75rem; }
    .result-item {
      background: rgba(255,255,255,.05); border-radius: 8px;
      padding: .65rem .9rem; margin-bottom: .5rem;
      display: flex; align-items: center; justify-content: space-between; gap: .5rem;
    }
    .result-item .prize-label { font-size: .75rem; color: var(--gold); opacity: .8; }
    .result-item .winner-name { font-weight: 700; font-size: .95rem; }
    .result-item .winner-info { font-size: .75rem; opacity: .7; }
    .result-item.revoked { opacity: .4; text-decoration: line-through; }
    .btn-revoke {
      background: rgba(255,100,100,.2); border: 1px solid rgba(255,100,100,.4);
      color: #ff9999; padding: .25rem .6rem; border-radius: 5px; font-size: .75rem;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .btn-revoke:hover { background: rgba(255,100,100,.35); }
    .eligible-count {
      padding: .5rem 1.25rem; font-size: .8rem; color: rgba(255,228,181,.5);
      border-top: 1px solid rgba(255,215,0,.1); flex-shrink: 0;
    }

    /* ─── Overlay ─── */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,2,2,.92); z-index: 100;
      align-items: center; justify-content: center; flex-direction: column;
      cursor: pointer;
    }
    #overlay.show { display: flex; }
    .overlay-prize { font-size: clamp(1rem, 3vw, 1.8rem); color: var(--gold); opacity: .8; margin-bottom: 1rem; }
    .overlay-name {
      font-size: clamp(3rem, 8vw, 7rem); font-weight: 900; color: var(--gold);
      text-shadow: 0 0 60px rgba(255,215,0,.8);
      animation: pulse 1s ease-in-out infinite alternate;
    }
    .overlay-dept { font-size: clamp(1.2rem, 3vw, 2.2rem); color: var(--text-on-dark); margin-top: .5rem; }
    .overlay-empno { font-size: clamp(.9rem, 2vw, 1.4rem); color: rgba(255,228,181,.6); margin-top: .3rem; }
    .overlay-hint { font-size: .9rem; color: rgba(255,228,181,.4); margin-top: 2rem; }
    @keyframes pulse { from { text-shadow: 0 0 40px rgba(255,215,0,.6); } to { text-shadow: 0 0 80px rgba(255,215,0,1); } }

    /* ─── Confetti ─── */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; top: -10px;
      animation: confettiFall linear forwards;
      z-index: 101; border-radius: 2px;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ─── Login ─── -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🎊 抽獎系統</h1>
    <p>輔仁大學附設醫院 114年尾牙</p>
    <input type="password" id="pwInput" placeholder="請輸入密碼" autofocus>
    <button onclick="doLogin()">進入抽獎</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ─── App ─── -->
<div id="app">
  <header>
    <h1>🎊 輔仁大學附設醫院 114年尾牙抽獎 🎊</h1>
    <p id="eligibleCount">載入中…</p>
  </header>
  <main>
    <!-- Left -->
    <div class="draw-area">
      <div class="prize-selector">
        <select id="prizeSelect" onchange="onPrizeChange()">
          <option value="">— 請選擇獎項 —</option>
        </select>
      </div>
      <div class="marquee-wrap idle" id="marqueeWrap">
        <div id="marqueeText">請選擇獎項</div>
      </div>
      <div id="statusMsg"></div>
      <button id="drawBtn" onclick="startDraw()" disabled>開始抽獎</button>
    </div>

    <!-- Right -->
    <div class="results-panel">
      <h2>本場已抽出</h2>
      <div class="results-list" id="resultsList"></div>
      <div class="eligible-count" id="panelEligible"></div>
    </div>
  </main>
</div>

<!-- ─── Overlay ─── -->
<div id="overlay" onclick="closeOverlay()">
  <div class="overlay-prize" id="overlayPrize"></div>
  <div class="overlay-name" id="overlayName"></div>
  <div class="overlay-dept" id="overlayDept"></div>
  <div class="overlay-empno" id="overlayEmpno"></div>
  <div class="overlay-hint">點擊任意處關閉</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script>
  let _prizes = [];
  let _results = [];
  let _eligible = [];
  let _marqueeInterval = null;
  let _pendingResult = null;
  let _overlayTimer = null;
  let _isDrawing = false;

  // ─── Auth ────────────────────────────────────────────────
  async function doLogin() {
    const pw = document.getElementById('pwInput').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    try {
      await Store.signIn(pw);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await loadAll();
    } catch (e) {
      errEl.textContent = '密碼錯誤，請重新輸入';
    }
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ─── Load ────────────────────────────────────────────────
  async function loadAll() {
    [_prizes, _results, _eligible] = await Promise.all([
      Store.getPrizes(),
      Store.getResults(),
      Store.getEligible()
    ]);
    renderPrizeSelect();
    renderResultsList();
    updateEligibleCount();
    setupRealtime();
  }

  function setupRealtime() {
    Store.subscribeResults(async () => {
      _results = await Store.getResults();
      _eligible = await Store.getEligible();
      renderResultsList();
      updateEligibleCount();
      onPrizeChange();
    });
    Store.subscribePrizes(async () => {
      _prizes = await Store.getPrizes();
      renderPrizeSelect();
    });
  }

  // ─── Prize Select ────────────────────────────────────────
  function renderPrizeSelect() {
    const sel = document.getElementById('prizeSelect');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— 請選擇獎項 —</option>' +
      _prizes.filter(p => p.active).map(p => {
        const remaining = p.quantity - p.winners_drawn;
        const done = remaining <= 0;
        return `<option value="${p.id}" ${done ? 'disabled' : ''} ${p.id === cur ? 'selected' : ''}>
          ${p.name}（剩 ${remaining} 名）${done ? ' ✓已抽完' : ''}
        </option>`;
      }).join('');
    onPrizeChange();
  }

  function onPrizeChange() {
    const prizeId = document.getElementById('prizeSelect').value;
    const btn = document.getElementById('drawBtn');
    const msg = document.getElementById('statusMsg');
    const wrap = document.getElementById('marqueeWrap');

    if (!prizeId) {
      btn.disabled = true;
      setMarqueeIdle('請選擇獎項');
      msg.textContent = '';
      return;
    }

    const prize = _prizes.find(p => p.id === prizeId);
    if (!prize) return;

    const remaining = prize.quantity - prize.winners_drawn;
    if (remaining <= 0) {
      btn.disabled = true;
      msg.textContent = '此獎項已抽完';
      setMarqueeIdle('已抽完');
      return;
    }

    if (_eligible.length === 0) {
      btn.disabled = true;
      msg.textContent = '所有人員已抽完';
      setMarqueeIdle('無可抽人員');
      return;
    }

    btn.disabled = false;
    msg.textContent = `可抽 ${_eligible.length} 人 ／ 剩餘 ${remaining} 名`;
    wrap.classList.remove('idle');
    document.getElementById('marqueeText').textContent = '按下按鈕開始';
  }

  function setMarqueeIdle(msg) {
    const wrap = document.getElementById('marqueeWrap');
    wrap.classList.add('idle');
    document.getElementById('marqueeText').textContent = msg;
  }

  // ─── Draw ────────────────────────────────────────────────
  async function startDraw() {
    if (_isDrawing) return;
    const prizeId = document.getElementById('prizeSelect').value;
    if (!prizeId) return;

    _isDrawing = true;
    document.getElementById('drawBtn').disabled = true;
    document.getElementById('statusMsg').textContent = '抽獎中…';

    const result = await Store.draw(prizeId);

    if (!result) {
      _isDrawing = false;
      document.getElementById('drawBtn').disabled = false;
      document.getElementById('statusMsg').textContent = '抽獎失敗，請重試';
      return;
    }

    const displayList = buildMarqueeList(result.participant_name);
    runMarqueeAnimation(displayList, result, () => {
      showOverlay(result);
      _isDrawing = false;
    });
  }

  function buildMarqueeList(winnerName) {
    const names = _eligible.map(p => p.name).filter(n => n !== winnerName);
    const shuffled = names.sort(() => Math.random() - .5).slice(0, 19);
    shuffled.push(winnerName);
    return shuffled.sort(() => Math.random() - .5);
  }

  function runMarqueeAnimation(names, result, onDone) {
    const el = document.getElementById('marqueeText');
    let interval = 50;
    let elapsed = 0;
    const totalDuration = 2800;
    const slowStart = 1800;
    let idx = 0;

    if (_marqueeInterval) clearInterval(_marqueeInterval);

    function tick() {
      el.textContent = names[idx % names.length];
      idx++;
      elapsed += interval;

      if (elapsed >= totalDuration) {
        clearInterval(_marqueeInterval);
        el.textContent = result.participant_name;
        setTimeout(onDone, 300);
        return;
      }

      if (elapsed > slowStart) {
        interval = Math.min(interval + 25, 400);
        clearInterval(_marqueeInterval);
        _marqueeInterval = setInterval(tick, interval);
      }
    }

    _marqueeInterval = setInterval(tick, interval);
  }

  // ─── Overlay ─────────────────────────────────────────────
  function showOverlay(result) {
    document.getElementById('overlayPrize').textContent = '🎁 ' + result.prize_name;
    document.getElementById('overlayName').textContent = result.participant_name;
    document.getElementById('overlayDept').textContent = result.participant_dept;
    document.getElementById('overlayEmpno').textContent =
      result.participant_employee_no ? '員工編號：' + result.participant_employee_no : '';
    document.getElementById('overlay').classList.add('show');
    launchConfetti();

    if (_overlayTimer) clearTimeout(_overlayTimer);
    _overlayTimer = setTimeout(closeOverlay, 5000);
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    if (_overlayTimer) clearTimeout(_overlayTimer);
    loadAll();
  }

  function launchConfetti() {
    const colors = ['#FFD700','#FF4500','#FF69B4','#00CED1','#ADFF2F','#FF6347'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = Math.random() * .5 + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ─── Results List ─────────────────────────────────────────
  function renderResultsList() {
    const el = document.getElementById('resultsList');
    const active = _results.filter(r => !r.revoked);
    const revoked = _results.filter(r => r.revoked);
    const all = [...active, ...revoked];

    el.innerHTML = all.length === 0
      ? '<div style="text-align:center;opacity:.4;padding:2rem;font-size:.9rem">尚未抽出任何獎項</div>'
      : all.map(r => `
        <div class="result-item ${r.revoked ? 'revoked' : ''}">
          <div>
            <div class="prize-label">${r.prize_name}</div>
            <div class="winner-name">${r.participant_name}</div>
            <div class="winner-info">${r.participant_dept}${r.participant_employee_no ? ' ‧ ' + r.participant_employee_no : ''}</div>
          </div>
          ${!r.revoked
            ? `<button class="btn-revoke" onclick="revokeResult('${r.id}','${r.participant_name}')">重抽</button>`
            : '<span style="font-size:.75rem;color:#ff9999">已重抽</span>'}
        </div>
      `).join('');
  }

  async function revokeResult(id, name) {
    const reason = prompt(`重抽原因（${name}）`);
    if (reason === null) return;
    if (!reason.trim()) { alert('請填入重抽原因'); return; }
    await Store.revoke(id, reason.trim());
    await loadAll();
  }

  function updateEligibleCount() {
    const txt = `目前可抽人數：${_eligible.length} 人`;
    document.getElementById('eligibleCount').textContent = txt;
    document.getElementById('panelEligible').textContent = txt;
  }
</script>
</body>
</html>
