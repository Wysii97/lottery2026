<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>尾牙抽獎 — 輔仁大學附設醫院</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B0000;
      --gold: #FFD700;
      --gold-dark: #B8860B;
      --bg-dark: #1a0a0a;
      --text-on-dark: #FFE4B5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg-dark);
      color: var(--text-on-dark);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Login ─── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: rgba(255,255,255,.07); padding: 2.5rem; border-radius: 16px;
      border: 1px solid rgba(255,215,0,.3); text-align: center; width: 340px;
    }
    .login-box h1 { color: var(--gold); font-size: 1.6rem; margin-bottom: .5rem; }
    .login-box p { color: var(--text-on-dark); font-size: .9rem; margin-bottom: 1.5rem; opacity: .8; }
    .login-box input {
      width: 100%; padding: .85rem; background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,215,0,.4); border-radius: 8px; color: #fff;
      font-size: 1.1rem; text-align: center; letter-spacing: .3em;
      font-family: inherit; margin-bottom: 1rem;
    }
    .login-box button {
      width: 100%; padding: .85rem; background: var(--gold); color: #1a0a0a;
      border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 900;
      cursor: pointer; font-family: inherit;
    }
    .login-box button:hover { background: #ffd000; }
    #loginError { color: #ff6b6b; font-size: .9rem; margin-top: .75rem; }

    /* ─── Header ─── */
    #app { display: none; }
    header {
      text-align: center; padding: 1.5rem 2rem 1rem;
      border-bottom: 1px solid rgba(255,215,0,.15);
    }
    header h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 900; color: var(--gold);
      text-shadow: 0 0 20px rgba(255,215,0,.4);
    }
    header p { font-size: 1rem; opacity: .7; margin-top: .3rem; }

    /* ─── Main layout ─── */
    main { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; padding: 1.5rem 2rem; height: calc(100vh - 120px); }

    /* ─── Left: Draw area ─── */
    .draw-area { display: flex; flex-direction: column; gap: 1.25rem; }

    .prize-selector select {
      width: 100%; padding: .85rem 1rem; background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,215,0,.4); border-radius: 10px; color: var(--gold);
      font-size: 1.2rem; font-weight: 700; font-family: inherit; cursor: pointer;
    }
    .prize-selector select option { background: #2a1010; color: var(--gold); }

    /* ─── Marquee ─── */
    .marquee-wrap {
      flex: 1; background: rgba(255,255,255,.04);
      border: 2px solid rgba(255,215,0,.2); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative; min-height: 200px;
    }
    #marqueeText {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 900; color: var(--gold);
      text-shadow: 0 0 30px rgba(255,215,0,.6);
      transition: none; user-select: none;
    }
    .marquee-wrap.idle #marqueeText { color: rgba(255,215,0,.3); }

    /* ─── Draw Button ─── */
    #drawBtn {
      padding: 1.2rem; font-size: clamp(1.2rem, 2.5vw, 1.8rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold), #ff8c00);
      color: #1a0a0a; border: none; border-radius: 14px; cursor: pointer;
      font-family: inherit; letter-spacing: .05em;
      box-shadow: 0 4px 20px rgba(255,215,0,.3);
      transition: transform .1s, box-shadow .1s;
    }
    #drawBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,215,0,.5); }
    #drawBtn:active:not(:disabled) { transform: translateY(0); }
    #drawBtn:disabled { opacity: .4; cursor: not-allowed; }
    #statusMsg { text-align: center; font-size: .95rem; color: rgba(255,228,181,.7); min-height: 1.4em; }

    /* ─── Right: Results list ─── */
    .results-panel {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,215,0,.15);
      border-radius: 16px; display: flex; flex-direction: column; overflow: hidden;
    }
    .results-panel h2 {
      padding: 1rem 1.25rem; font-size: 1rem; color: var(--gold);
      border-bottom: 1px solid rgba(255,215,0,.15); flex-shrink: 0;
    }
    .results-list { flex: 1; overflow-y: auto; padding: .75rem; }
    .result-item {
      background: rgba(255,255,255,.05); border-radius: 8px;
      padding: .65rem .9rem; margin-bottom: .5rem;
      display: flex; align-items: center; justify-content: space-between; gap: .5rem;
    }
    .result-item .prize-label { font-size: .75rem; color: var(--gold); opacity: .8; }
    .result-item .winner-name { font-weight: 700; font-size: .95rem; }
    .result-item .winner-info { font-size: .75rem; opacity: .7; }
    .result-item.revoked { opacity: .4; text-decoration: line-through; }
    .btn-revoke {
      background: rgba(255,100,100,.2); border: 1px solid rgba(255,100,100,.4);
      color: #ff9999; padding: .25rem .6rem; border-radius: 5px; font-size: .75rem;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .btn-revoke:hover { background: rgba(255,100,100,.35); }
    .eligible-count {
      padding: .5rem 1.25rem; font-size: .8rem; color: rgba(255,228,181,.5);
      border-top: 1px solid rgba(255,215,0,.1); flex-shrink: 0;
    }

    /* ─── Overlay ─── */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,2,2,.92); z-index: 100;
      align-items: center; justify-content: center; flex-direction: column;
      cursor: pointer;
    }
    #overlay.show { display: flex; }
    .overlay-prize { font-size: clamp(1rem, 3vw, 1.8rem); color: var(--gold); opacity: .8; margin-bottom: 1rem; }
    .overlay-name {
      font-size: clamp(3rem, 8vw, 7rem); font-weight: 900; color: var(--gold);
      text-shadow: 0 0 60px rgba(255,215,0,.8);
      animation: pulse 1s ease-in-out infinite alternate;
    }
    .overlay-dept { font-size: clamp(1.2rem, 3vw, 2.2rem); color: var(--text-on-dark); margin-top: .5rem; }
    .overlay-empno { font-size: clamp(.9rem, 2vw, 1.4rem); color: rgba(255,228,181,.6); margin-top: .3rem; }
    .overlay-hint { font-size: .9rem; color: rgba(255,228,181,.4); margin-top: 2rem; }
    @keyframes pulse { from { text-shadow: 0 0 40px rgba(255,215,0,.6); } to { text-shadow: 0 0 80px rgba(255,215,0,1); } }

    /* ─── Multi-winner overlay ─── */
    #overlayWinners {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 1.25rem; max-height: 68vh; overflow-y: auto;
      padding: .5rem 1rem; max-width: 92vw;
    }
    .overlay-winner-card {
      background: rgba(255,215,0,.08); border: 1px solid rgba(255,215,0,.3);
      border-radius: 20px; padding: 1.5rem 2.5rem; text-align: center;
      animation: pulse 1s ease-in-out infinite alternate;
    }
    .overlay-winner-card .winner-name-big {
      font-size: clamp(4rem, 10vw, 8rem); font-weight: 900; color: var(--gold);
      text-shadow: 0 0 60px rgba(255,215,0,.9); line-height: 1.1;
    }
    .overlay-winner-card .winner-dept { font-size: clamp(1.4rem, 3.5vw, 2.8rem); color: var(--text-on-dark); margin-top: .6rem; }
    .overlay-winner-card .winner-empno { font-size: clamp(1rem, 2.5vw, 1.8rem); color: rgba(255,228,181,.6); margin-top: .4rem; }
    .overlay-progress { font-size: clamp(.9rem, 2vw, 1.4rem); color: rgba(255,228,181,.6); margin-top: 1.5rem; letter-spacing: .05em; }

    /* ─── Batch count input ─── */
    .batch-row {
      display: flex; align-items: center; gap: .75rem;
    }
    .batch-row label { color: rgba(255,228,181,.7); font-size: .9rem; white-space: nowrap; }
    .batch-row input {
      width: 80px; padding: .5rem; background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,215,0,.4); border-radius: 8px;
      color: var(--gold); font-size: 1rem; text-align: center; font-family: inherit;
    }

    /* ─── Batch overlay ─── */
    #overlay.batch #overlayWinners {
      flex-wrap: wrap; align-items: center; justify-content: center;
    }
    #overlay.batch .overlay-winner-card {
      padding: 1rem 1.6rem; animation: none;
      border: 1px solid rgba(255,215,0,.4);
    }
    #overlay.batch .overlay-winner-card .winner-name-big {
      font-size: clamp(2rem, 5vw, 4rem);
    }
    #overlay.batch .overlay-winner-card .winner-dept {
      font-size: clamp(.9rem, 2.5vw, 2rem);
    }
    #overlay.batch .overlay-winner-card .winner-empno {
      font-size: clamp(.75rem, 1.5vw, 1.3rem);
    }
    /* Card appear animation */
    @keyframes winnerAppear {
      from { transform: scale(0.7) translateY(24px); opacity: 0; }
      to   { transform: scale(1)   translateY(0);    opacity: 1; }
    }
    .winner-appear { animation: winnerAppear .5s cubic-bezier(.34,1.56,.64,1) forwards; }

    /* ─── Confetti ─── */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; top: -10px;
      animation: confettiFall linear forwards;
      z-index: 101; border-radius: 2px;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ─── Login ─── -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🎊 抽獎系統</h1>
    <p>輔仁大學附設醫院 115年尾牙</p>
    <input type="password" id="pwInput" placeholder="請輸入密碼" autofocus>
    <button onclick="doLogin()">進入抽獎</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ─── App ─── -->
<div id="app">
  <header>
    <h1>🎊 輔仁大學附設醫院 115年尾牙抽獎 🎊</h1>
    <p id="eligibleCount">載入中…</p>
  </header>
  <main>
    <!-- Left -->
    <div class="draw-area">
      <div class="prize-selector">
        <select id="prizeSelect" onchange="onPrizeChange()">
          <option value="">— 請選擇獎項 —</option>
        </select>
      </div>
      <div class="marquee-wrap idle" id="marqueeWrap">
        <div id="marqueeText">請選擇獎項</div>
      </div>
      <div id="statusMsg"></div>
      <div class="batch-row">
        <label for="batchCount">批次人數：</label>
        <input type="number" id="batchCount" min="1" max="50" value="1">
      </div>
      <button id="drawBtn" onclick="startDraw()" disabled>開始抽獎</button>
    </div>

    <!-- Right -->
    <div class="results-panel">
      <h2>本場已抽出</h2>
      <div class="results-list" id="resultsList"></div>
      <div class="eligible-count" id="panelEligible"></div>
    </div>
  </main>
</div>

<!-- ─── Overlay ─── -->
<div id="overlay" onclick="handleOverlayClick()">
  <div class="overlay-prize" id="overlayPrize"></div>
  <div id="overlayWinners"></div>
  <div class="overlay-progress" id="overlayProgress"></div>
  <div class="overlay-hint" id="overlayHint">點擊任意處關閉</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script>
  let _prizes = [];
  let _results = [];
  let _eligible = [];
  let _marqueeInterval = null;
  let _overlayTimer = null;
  let _isDrawing = false;
  let _isAnimating = false;
  let _batchResults = [];
  let _batchAddActive = false;

  // ─── Utility ──────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ─── Auth ────────────────────────────────────────────────
  async function doLogin() {
    const pw = document.getElementById('pwInput').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    try {
      await Store.signIn(pw);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await loadAll();
    } catch (e) {
      errEl.textContent = '密碼錯誤，請重新輸入';
    }
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ─── Load ────────────────────────────────────────────────
  async function loadAll() {
    [_prizes, _results, _eligible] = await Promise.all([
      Store.getPrizes(),
      Store.getResults(),
      Store.getEligible()
    ]);
    renderPrizeSelect();
    renderResultsList();
    updateEligibleCount();
    setupRealtime();
  }

  function setupRealtime() {
    Store.subscribeResults(async () => {
      _results = await Store.getResults();
      _eligible = await Store.getEligible();
      if (!_isAnimating) { renderResultsList(); updateEligibleCount(); onPrizeChange(); }
    });
    Store.subscribePrizes(async () => {
      _prizes = await Store.getPrizes();
      renderPrizeSelect();
    });
    Store.subscribeParticipants(async () => {
      _eligible = await Store.getEligible();
      if (!_isAnimating) { updateEligibleCount(); onPrizeChange(); }
    });
  }

  // ─── Prize Select ────────────────────────────────────────
  function renderPrizeSelect() {
    const sel = document.getElementById('prizeSelect');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— 請選擇獎項 —</option>' +
      _prizes.filter(p => p.active).map(p => {
        const remaining = p.quantity - p.winners_drawn;
        const done = remaining <= 0;
        return `<option value="${p.id}" ${done ? 'disabled' : ''} ${p.id === cur ? 'selected' : ''}>
          ${p.name}（剩 ${remaining} 名）${done ? ' ✓已抽完' : ''}
        </option>`;
      }).join('');
    onPrizeChange();
  }

  function onPrizeChange() {
    const prizeId = document.getElementById('prizeSelect').value;
    const btn = document.getElementById('drawBtn');
    const msg = document.getElementById('statusMsg');

    if (!prizeId) { btn.disabled = true; setMarqueeIdle('請選擇獎項'); msg.textContent = ''; return; }

    const prize = _prizes.find(p => p.id === prizeId);
    if (!prize) return;

    const remaining = prize.quantity - prize.winners_drawn;
    if (remaining <= 0) { btn.disabled = true; msg.textContent = '此獎項已抽完'; setMarqueeIdle('已抽完'); return; }
    if (_eligible.length === 0) { btn.disabled = true; msg.textContent = '所有人員已抽完'; setMarqueeIdle('無可抽人員'); return; }

    btn.disabled = false;
    msg.textContent = `可抽 ${_eligible.length} 人 ／ 剩餘 ${remaining} 名`;
    document.getElementById('marqueeWrap').classList.remove('idle');
    document.getElementById('marqueeText').textContent = '按下按鈕開始';

    const batchInput = document.getElementById('batchCount');
    const maxBatch = Math.min(_eligible.length, remaining);
    batchInput.max = maxBatch;
    if (parseInt(batchInput.value) > maxBatch) batchInput.value = maxBatch;
  }

  function setMarqueeIdle(text) {
    document.getElementById('marqueeWrap').classList.add('idle');
    document.getElementById('marqueeText').textContent = text;
  }

  // ─── Draw ────────────────────────────────────────────────
  async function startDraw() {
    if (_isDrawing) return;
    const prizeId = document.getElementById('prizeSelect').value;
    if (!prizeId) return;
    const batchCount = Math.max(1, parseInt(document.getElementById('batchCount').value) || 1);

    _isDrawing = true;
    _isAnimating = true;
    document.getElementById('drawBtn').disabled = true;
    document.getElementById('statusMsg').textContent = '';

    if (batchCount === 1) {
      // ── 單人：立即啟動滾動動畫，同步觸發 DB 抽獎 ──
      document.getElementById('marqueeWrap').classList.remove('idle');
      const namePool = shuffle(_eligible.map(p => p.name));
      const drawPromise = Store.draw(prizeId);

      runMarqueeWithPromise(namePool, drawPromise, (result) => {
        if (!result) {
          _isDrawing = false; _isAnimating = false;
          document.getElementById('drawBtn').disabled = false;
          document.getElementById('statusMsg').textContent = '抽獎失敗，請重試';
          setMarqueeIdle('抽獎失敗');
          return;
        }
        _batchResults = [result];
        showSingleOverlay(result);
      });

    } else {
      // ── 批次：抽完後直接在畫面上依序揭曉，不跑滾動動畫 ──
      document.getElementById('statusMsg').textContent = `批次抽獎（${batchCount} 人）中…`;
      const results = [];
      for (let i = 0; i < batchCount; i++) {
        const r = await Store.draw(prizeId);
        if (r) results.push(r); else break;
      }
      document.getElementById('statusMsg').textContent = '';
      if (results.length === 0) {
        _isDrawing = false; _isAnimating = false;
        document.getElementById('drawBtn').disabled = false;
        document.getElementById('statusMsg').textContent = '抽獎失敗，請重試';
        return;
      }
      _batchResults = results;
      showBatchOverlay(results);
    }
  }

  // ── 滾動動畫：立即開始，等 DB 結果回來後減速收尾 ──
  function runMarqueeWithPromise(namePool, drawPromise, onDone) {
    const el = document.getElementById('marqueeText');
    if (_marqueeInterval) clearInterval(_marqueeInterval);

    let pool = [...namePool];
    let poolIdx = 0;
    let intervalMs = 50;
    let elapsed = 0;
    let drawResult = undefined; // undefined=pending, null=failed
    let revealing = false;

    drawPromise.then(r => { drawResult = r; }).catch(() => { drawResult = null; });

    function nextName() {
      if (poolIdx >= pool.length) { pool = shuffle([...namePool]); poolIdx = 0; } // 重洗避免重複
      return pool[poolIdx++];
    }

    function tick() {
      el.textContent = nextName();
      elapsed += intervalMs;

      // 至少滾 1500ms 且 DB 已回傳 → 減速收尾
      if (!revealing && elapsed >= 1500 && drawResult !== undefined) {
        revealing = true;
        clearInterval(_marqueeInterval);
        slowReveal(nextName, drawResult, el, onDone);
        return;
      }
      // DB 還沒回來但已超 1500ms → 稍降速，保持視覺等待感
      if (!revealing && elapsed > 1500 && drawResult === undefined && intervalMs < 150) {
        intervalMs = 150;
        clearInterval(_marqueeInterval);
        _marqueeInterval = setInterval(tick, intervalMs);
      }
    }

    _marqueeInterval = setInterval(tick, intervalMs);
  }

  function slowReveal(nextName, result, el, onDone) {
    const steps = [120, 180, 260, 360, 460];
    let i = 0;
    function step() {
      if (i < steps.length) {
        el.textContent = nextName();
        setTimeout(step, steps[i++]);
      } else {
        el.textContent = result ? result.participant_name : '—';
        setTimeout(() => onDone(result), 350);
      }
    }
    step();
  }

  // ─── Single Overlay ───────────────────────────────────────
  function showSingleOverlay(result) {
    document.getElementById('overlayPrize').textContent = '🎁 ' + result.prize_name;
    document.getElementById('overlayWinners').innerHTML = `
      <div class="overlay-winner-card winner-appear">
        <div class="winner-name-big">${result.participant_name}</div>
        <div class="winner-dept">${result.participant_dept}</div>
        ${result.participant_employee_no
          ? `<div class="winner-empno">員工編號：${result.participant_employee_no}</div>` : ''}
      </div>`;
    document.getElementById('overlayProgress').textContent = '';
    document.getElementById('overlayHint').textContent = '點擊任意處關閉';

    const ov = document.getElementById('overlay');
    ov.classList.remove('batch'); ov.classList.add('show');
    launchConfetti();
    if (_overlayTimer) clearTimeout(_overlayTimer);
    _overlayTimer = setTimeout(closeOverlay, 5000);
  }

  // ─── Batch Overlay ────────────────────────────────────────
  function showBatchOverlay(results) {
    _batchAddActive = true;
    document.getElementById('overlayPrize').textContent = '🎁 ' + results[0].prize_name;
    const container = document.getElementById('overlayWinners');
    container.innerHTML = '';
    document.getElementById('overlayProgress').textContent = `共 ${results.length} 位得獎者`;
    document.getElementById('overlayHint').textContent = '';

    const ov = document.getElementById('overlay');
    ov.classList.add('show', 'batch');

    let i = 0;
    function addNext() {
      if (!_batchAddActive) return;
      if (i >= results.length) {
        document.getElementById('overlayHint').textContent = '點擊任意處關閉';
        launchConfetti();
        if (_overlayTimer) clearTimeout(_overlayTimer);
        _overlayTimer = setTimeout(closeOverlay, 6000);
        return;
      }
      const r = results[i++];
      const card = document.createElement('div');
      card.className = 'overlay-winner-card winner-appear';
      card.innerHTML = `
        <div class="winner-name-big">${r.participant_name}</div>
        <div class="winner-dept">${r.participant_dept}</div>
        ${r.participant_employee_no ? `<div class="winner-empno">員工編號：${r.participant_employee_no}</div>` : ''}`;
      container.appendChild(card);
      launchConfetti();
      setTimeout(addNext, 900);
    }
    addNext();
  }

  function handleOverlayClick() {
    if (_overlayTimer) clearTimeout(_overlayTimer);
    closeOverlay();
  }

  function closeOverlay() {
    _batchAddActive = false;
    document.getElementById('overlay').classList.remove('show', 'batch');
    if (_overlayTimer) clearTimeout(_overlayTimer);
    _isAnimating = false;
    _isDrawing = false;
    _batchResults = [];
    loadAll();
  }

  function launchConfetti() {
    const colors = ['#FFD700','#FF4500','#FF69B4','#00CED1','#ADFF2F','#FF6347'];
    for (let i = 0; i < 80; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      el.style.animationDelay = Math.random() * .5 + 's';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ─── Results List ─────────────────────────────────────────
  function renderResultsList() {
    const el = document.getElementById('resultsList');
    const active = _results.filter(r => !r.revoked);
    const revoked = _results.filter(r => r.revoked);
    const all = [...active, ...revoked];
    el.innerHTML = all.length === 0
      ? '<div style="text-align:center;opacity:.4;padding:2rem;font-size:.9rem">尚未抽出任何獎項</div>'
      : all.map(r => `
        <div class="result-item ${r.revoked ? 'revoked' : ''}">
          <div>
            <div class="prize-label">${r.prize_name}</div>
            <div class="winner-name">${r.participant_name}</div>
            <div class="winner-info">${r.participant_dept}${r.participant_employee_no ? ' ‧ ' + r.participant_employee_no : ''}</div>
          </div>
          ${!r.revoked
            ? `<button class="btn-revoke" onclick="revokeResult('${r.id}','${r.participant_name}')">重抽</button>`
            : '<span style="font-size:.75rem;color:#ff9999">已重抽</span>'}
        </div>`).join('');
  }

  async function revokeResult(id, name) {
    const reason = prompt(`重抽原因（${name}）`);
    if (reason === null) return;
    if (!reason.trim()) { alert('請填入重抽原因'); return; }
    await Store.revoke(id, reason.trim());
    await loadAll();
  }

  function updateEligibleCount() {
    const txt = `目前可抽人數：${_eligible.length} 人`;
    document.getElementById('eligibleCount').textContent = txt;
    document.getElementById('panelEligible').textContent = txt;
  }
</script>
</body>
</html>
