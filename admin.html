<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>後台管理 — 尾牙抽獎系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B0000;
      --primary-light: #C41E3A;
      --gold: #FFD700;
      --bg-light: #FFF8F0;
      --success: #2E7D32;
      --danger: #C62828;
      --warning: #F57F17;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f5f5f5; color: #333; }

    /* ─── Login ─── */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--bg-light);
    }
    .login-box {
      background: #fff; padding: 2.5rem; border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12); text-align: center; width: 320px;
    }
    .login-box h1 { color: var(--primary); font-size: 1.5rem; margin-bottom: .5rem; }
    .login-box p { color: #666; font-size: .9rem; margin-bottom: 1.5rem; }
    .login-box input {
      width: 100%; padding: .75rem; border: 1px solid #ddd; border-radius: 8px;
      font-size: 1rem; margin-bottom: 1rem; text-align: center; letter-spacing: .2em;
    }
    .login-box button {
      width: 100%; padding: .75rem; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 700;
    }
    .login-box button:hover { background: var(--primary-light); }
    #loginError { color: var(--danger); font-size: .9rem; margin-top: .75rem; }

    /* ─── Header ─── */
    #app { display: none; }
    header {
      background: var(--primary); color: #fff;
      padding: .75rem 1.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.1rem; }
    header button {
      background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4);
      padding: .4rem .9rem; border-radius: 6px; cursor: pointer; font-size: .85rem;
    }

    /* ─── Tabs ─── */
    .tabs { display: flex; background: #fff; border-bottom: 2px solid #eee; }
    .tab-btn {
      padding: .85rem 1.5rem; border: none; background: none; cursor: pointer;
      font-size: .95rem; font-family: inherit; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    /* ─── Content ─── */
    .tab-content { display: none; padding: 1.5rem; }
    .tab-content.active { display: block; }

    /* ─── Stats bar ─── */
    .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .stat-card {
      background: #fff; padding: 1rem 1.5rem; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); text-align: center; min-width: 120px;
    }
    .stat-card .num { font-size: 2rem; font-weight: 900; color: var(--primary); }
    .stat-card .label { font-size: .8rem; color: #666; margin-top: .2rem; }

    /* ─── Forms & Buttons ─── */
    .form-row { display: flex; gap: .75rem; align-items: flex-end; flex-wrap: wrap; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: .3rem; }
    .form-group label { font-size: .85rem; color: #555; }
    .form-group input, .form-group select {
      padding: .6rem .75rem; border: 1px solid #ddd; border-radius: 6px;
      font-size: .95rem; font-family: inherit;
    }
    .btn {
      padding: .6rem 1.1rem; border: none; border-radius: 6px; cursor: pointer;
      font-size: .9rem; font-family: inherit; font-weight: 700;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-light); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #b71c1c; }
    .btn-warning { background: var(--warning); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-sm { padding: .3rem .65rem; font-size: .8rem; }
    .btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
    .btn-outline:hover { background: #f5f5f5; }

    /* ─── File Upload ─── */
    .file-drop {
      border: 2px dashed #ddd; border-radius: 10px; padding: 1.5rem;
      text-align: center; cursor: pointer; transition: all .2s; background: #fafafa;
      position: relative;
    }
    .file-drop:hover, .file-drop.drag-over {
      border-color: var(--primary); background: #fff5f5;
    }
    .file-drop input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .file-drop-icon { font-size: 2rem; margin-bottom: .4rem; }
    .file-drop-text { font-size: .9rem; color: #555; }
    .file-drop-hint { font-size: .78rem; color: #aaa; margin-top: .25rem; }
    .file-drop.has-file { border-color: var(--success); background: #f1f8f1; }
    .file-drop.has-file .file-drop-icon::after { content: ' ✅'; }

    /* ─── Table ─── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
    th { background: #f0f0f0; padding: .65rem .9rem; font-size: .85rem; text-align: left; color: #555; }
    td { padding: .65rem .9rem; font-size: .9rem; border-top: 1px solid #f0f0f0; }
    tr:hover td { background: #fafafa; }
    .badge {
      display: inline-block; padding: .2rem .55rem; border-radius: 20px;
      font-size: .75rem; font-weight: 700;
    }
    .badge-green { background: #e8f5e9; color: var(--success); }
    .badge-red { background: #ffebee; color: var(--danger); }
    .badge-grey { background: #f5f5f5; color: #888; }

    /* ─── Misc ─── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem; flex-wrap: wrap; gap: .5rem;
    }
    .section-header h2 { font-size: 1.1rem; color: var(--primary); }
    .search-row { display: flex; gap: .5rem; margin-bottom: 1rem; }
    .search-row input { flex: 1; padding: .6rem .75rem; border: 1px solid #ddd; border-radius: 6px; font-size: .95rem; font-family: inherit; }
    .divider { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
    .revoked td { opacity: .5; text-decoration: line-through; }
    .log-item { padding: .5rem; border-bottom: 1px solid #f0f0f0; font-size: .85rem; }
    .log-item .time { color: #aaa; font-size: .75rem; margin-right: .5rem; }
    .log-item .action { color: var(--primary); font-weight: 700; margin-right: .5rem; }

    /* ─── Inline Edit ─── */
    .inline-edit-input {
      padding: .3rem .5rem; border: 1px solid #1976d2; border-radius: 4px;
      font-size: .9rem; font-family: inherit; background: #f0f7ff; width: 100%;
    }
    tr.editing td { background: #e8f0fe !important; }

    /* ─── Toast ─── */
    #toastContainer {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      display: flex; flex-direction: column; gap: .5rem;
    }
    .toast {
      padding: .85rem 1.25rem; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,.15);
      font-size: .9rem; font-weight: 700; max-width: 320px;
      animation: slideInRight .3s ease; display: flex; align-items: center; gap: .6rem;
    }
    .toast-success { background: #e8f5e9; color: var(--success); border-left: 4px solid var(--success); }
    .toast-error { background: #ffebee; color: var(--danger); border-left: 4px solid var(--danger); }
    .toast-info { background: #e3f2fd; color: #1565c0; border-left: 4px solid #1565c0; }
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>

<!-- ─── Login ─────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <h1>🔒 後台管理</h1>
    <p>輔仁大學附設醫院 115年尾牙</p>
    <input type="password" id="pwInput" placeholder="請輸入密碼" autofocus>
    <button onclick="doLogin()">登入</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- ─── App ───────────────────────────────────────── -->
<div id="app">
  <header>
    <h1>🎊 尾牙抽獎後台</h1>
    <button onclick="doLogout()">登出</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('participants', this)">抽獎人管理</button>
    <button class="tab-btn" onclick="switchTab('prizes', this)">獎品管理</button>
    <button class="tab-btn" onclick="switchTab('results', this)">中獎紀錄</button>
  </div>

  <!-- ─── Tab A：抽獎人管理 ─── -->
  <div id="tab-participants" class="tab-content active">
    <div class="stats" id="participantStats"></div>

    <!-- 單筆新增 -->
    <div class="section-header"><h2>新增人員</h2></div>
    <div class="form-row">
      <div class="form-group">
        <label>姓名 *</label>
        <input id="pName" type="text" placeholder="王小明" style="width:120px">
      </div>
      <div class="form-group">
        <label>部門 *</label>
        <input id="pDept" type="text" placeholder="護理部" style="width:140px">
      </div>
      <div class="form-group">
        <label>員工編號</label>
        <input id="pEmpNo" type="text" placeholder="A001" style="width:100px">
      </div>
      <button class="btn btn-primary" onclick="addParticipant()">新增</button>
    </div>

    <hr class="divider">

    <!-- Excel / CSV 匯入 -->
    <div class="section-header"><h2>Excel / CSV 批次匯入</h2></div>
    <div class="file-drop" id="participantDrop">
      <input type="file" id="participantFile" accept=".xlsx,.xls,.csv" onchange="handleParticipantFile(this.files[0])">
      <div class="file-drop-icon">📤</div>
      <div class="file-drop-text">點擊或拖曳檔案至此</div>
      <div class="file-drop-hint">支援 .xlsx、.xls、.csv｜欄位：姓名、部門、員工編號</div>
    </div>
    <div style="margin-top:.5rem;display:flex;gap:.5rem;align-items:center">
      <button class="btn btn-primary btn-sm" onclick="doImportParticipants()">匯入</button>
      <span id="participantFileLabel" style="font-size:.85rem;color:#888">尚未選擇檔案</span>
    </div>

    <hr class="divider">

    <!-- 批次操作 -->
    <div class="section-header"><h2>批次操作</h2></div>
    <div class="form-row">
      <button class="btn btn-danger" onclick="clearEligible()">清除所有未中獎人員</button>
      <button class="btn btn-danger" onclick="clearAllData()">清空全部資料</button>
    </div>

    <hr class="divider">

    <!-- 搜尋 + 名單 -->
    <div class="section-header"><h2>人員名單</h2></div>
    <div class="search-row">
      <input id="pSearch" type="text" placeholder="搜尋姓名、部門、員工編號" oninput="filterParticipants()">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>姓名</th><th>部門</th><th>員工編號</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="participantTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ─── Tab B：獎品管理 ─── -->
  <div id="tab-prizes" class="tab-content">

    <!-- 單筆新增 -->
    <div class="section-header"><h2>新增獎品</h2></div>
    <div class="form-row">
      <div class="form-group">
        <label>獎品名稱 *</label>
        <input id="prizeName" type="text" placeholder="43吋電視" style="width:180px">
      </div>
      <div class="form-group">
        <label>數量 *</label>
        <input id="prizeQty" type="number" min="1" value="1" style="width:80px">
      </div>
      <div class="form-group">
        <label>排序（小 = 先抽）</label>
        <input id="prizeSortOrder" type="number" min="1" value="1" style="width:80px">
      </div>
      <button class="btn btn-primary" onclick="addPrize()">新增</button>
    </div>

    <hr class="divider">

    <!-- Excel / CSV 匯入 -->
    <div class="section-header"><h2>Excel / CSV 批次匯入</h2></div>
    <div class="file-drop" id="prizeDrop">
      <input type="file" id="prizeFile" accept=".xlsx,.xls,.csv" onchange="handlePrizeFile(this.files[0])">
      <div class="file-drop-icon">📤</div>
      <div class="file-drop-text">點擊或拖曳檔案至此</div>
      <div class="file-drop-hint">支援 .xlsx、.xls、.csv｜欄位：獎項名稱、數量、排序</div>
    </div>
    <div style="margin-top:.5rem;display:flex;gap:.5rem;align-items:center">
      <button class="btn btn-primary btn-sm" onclick="doImportPrizes()">匯入</button>
      <span id="prizeFileLabel" style="font-size:.85rem;color:#888">尚未選擇檔案</span>
    </div>

    <hr class="divider">

    <div class="section-header"><h2>獎品列表</h2></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>排序</th><th>獎品名稱</th><th>總數</th><th>已抽</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="prizeTable"></tbody>
      </table>
    </div>
  </div>

  <!-- ─── Tab C：中獎紀錄 ─── -->
  <div id="tab-results" class="tab-content">
    <div class="section-header">
      <h2>中獎紀錄</h2>
      <button class="btn btn-success" onclick="exportCsv()">匯出 CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>獎品</th><th>姓名</th><th>部門</th><th>員工編號</th><th>時間</th><th>狀態</th><th>操作</th></tr></thead>
        <tbody id="resultsTable"></tbody>
      </table>
    </div>

    <hr class="divider">
    <div class="section-header"><h2>操作日誌（最近 50 筆）</h2></div>
    <div id="logsList"></div>
  </div>
</div>

<!-- Toast -->
<div id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script>
  let _allParticipants = [];
  let _allPrizes = [];
  let _pendingParticipantFile = null;
  let _pendingPrizeFile = null;
  let _editingParticipantId = null;
  let _editingPrizeId = null;

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Toast ───────────────────────────────────────────────
  function showToast(msg, type = 'info') {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const el = document.createElement('div');
    el.className = `toast toast-${type}`;
    el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    document.getElementById('toastContainer').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ─── Auth ───────────────────────────────────────────────
  async function doLogin() {
    const pw = document.getElementById('pwInput').value;
    const errEl = document.getElementById('loginError');
    errEl.textContent = '';
    try {
      await Store.signIn(pw);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      await loadAll();
    } catch (e) {
      errEl.textContent = '密碼錯誤，請重新輸入';
    }
  }

  document.getElementById('pwInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogout() {
    await Store.signOut();
    location.reload();
  }

  // ─── Tabs ────────────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'results') loadResults();
    if (name === 'prizes') renderPrizes();
    if (name === 'participants') renderParticipants();
  }

  // ─── Load All ────────────────────────────────────────────
  async function loadAll() {
    _allParticipants = await Store.getParticipants();
    _allPrizes = await Store.getPrizes();
    renderParticipantStats();
    renderParticipants();
    renderPrizes();
    Store.subscribeParticipants(async () => {
      _allParticipants = await Store.getParticipants();
      renderParticipantStats();
      renderParticipants();
    });
    Store.subscribePrizes(async () => {
      _allPrizes = await Store.getPrizes();
      renderPrizes();
    });
    setupDragDrop('participantDrop');
    setupDragDrop('prizeDrop');
  }

  // ─── Drag & Drop ─────────────────────────────────────────
  function setupDragDrop(dropId) {
    const el = document.getElementById(dropId);
    if (!el) return;
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (!file) return;
      if (dropId === 'participantDrop') handleParticipantFile(file);
      else handlePrizeFile(file);
    });
  }

  // ─── Excel / CSV Parser ───────────────────────────────────
  async function parseFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      const isCsv = file.name.toLowerCase().endsWith('.csv');

      reader.onload = e => {
        try {
          if (isCsv) {
            // CSV 解析
            const text = new TextDecoder('utf-8').decode(new Uint8Array(e.target.result))
              .replace(/^\uFEFF/, '');
            const lines = text.split(/\r?\n/).filter(l => l.trim());
            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const rows = lines.slice(1).map(line => {
              const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
              const obj = {};
              headers.forEach((h, i) => obj[h] = cols[i] || '');
              return obj;
            }).filter(r => Object.values(r).some(v => v));
            resolve(rows);
          } else {
            // Excel 解析
            const data = new Uint8Array(e.target.result);
            const wb = XLSX.read(data, { type: 'array' });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
            resolve(rows);
          }
        } catch (err) {
          reject(new Error('無法解析檔案：' + err.message));
        }
      };
      reader.onerror = () => reject(new Error('讀取檔案失敗'));
      reader.readAsArrayBuffer(file);
    });
  }

  function findColumn(headers, candidates) {
    return headers.find(h => candidates.some(c => h.includes(c))) || null;
  }

  // ─── Participants Import ──────────────────────────────────
  function handleParticipantFile(file) {
    if (!file) return;
    _pendingParticipantFile = file;
    document.getElementById('participantFileLabel').textContent = `已選擇：${file.name}`;
    document.getElementById('participantDrop').classList.add('has-file');
  }

  async function doImportParticipants() {
    if (!_pendingParticipantFile) { showToast('請先選擇檔案', 'error'); return; }
    try {
      const rows = await parseFile(_pendingParticipantFile);
      if (rows.length === 0) { showToast('檔案中沒有資料', 'error'); return; }

      const headers = Object.keys(rows[0]);
      const nameCol = findColumn(headers, ['姓名', '名字', 'name', 'Name']);
      const deptCol = findColumn(headers, ['部門', '單位', 'department', 'Department']);
      const empNoCol = findColumn(headers, ['員工編號', '工號', '編號', 'employeeId', 'ID']);

      if (!nameCol) { showToast('找不到「姓名」欄位，請確認檔案格式', 'error'); return; }

      const csvText = [
        '姓名,部門,員工編號',
        ...rows.map(r => [
          r[nameCol] || '',
          deptCol ? (r[deptCol] || '') : '',
          empNoCol ? (r[empNoCol] || '') : ''
        ].join(','))
      ].join('\n');

      const result = await Store.importParticipants(csvText);
      _allParticipants = await Store.getParticipants();
      renderParticipantStats();
      renderParticipants();

      let msg = `成功匯入 ${result.added} 筆，略過 ${result.skipped} 筆（重複）`;
      showToast(msg, result.errors.length ? 'error' : 'success');
      if (result.errors.length) showToast(result.errors.slice(0,3).join('、'), 'error');

      _pendingParticipantFile = null;
      document.getElementById('participantFileLabel').textContent = '尚未選擇檔案';
      document.getElementById('participantDrop').classList.remove('has-file');
    } catch (e) {
      showToast('匯入失敗：' + e.message, 'error');
    }
  }

  // ─── Prizes Import ────────────────────────────────────────
  function handlePrizeFile(file) {
    if (!file) return;
    _pendingPrizeFile = file;
    document.getElementById('prizeFileLabel').textContent = `已選擇：${file.name}`;
    document.getElementById('prizeDrop').classList.add('has-file');
  }

  async function doImportPrizes() {
    if (!_pendingPrizeFile) { showToast('請先選擇檔案', 'error'); return; }
    try {
      const rows = await parseFile(_pendingPrizeFile);
      if (rows.length === 0) { showToast('檔案中沒有資料', 'error'); return; }

      const headers = Object.keys(rows[0]);
      const nameCol = findColumn(headers, ['獎項名稱', '獎項', '品名', '品項', '名稱', 'prize', 'Prize', 'Name', 'name']);
      const qtyCol = findColumn(headers, ['數量', '個數', 'quantity', 'Quantity']);
      const sortCol = findColumn(headers, ['排序', '順序', 'sort', 'order']);

      if (!nameCol) { showToast('找不到「獎項名稱」欄位，請確認檔案格式', 'error'); return; }

      const prizesData = rows
        .filter(r => r[nameCol] && String(r[nameCol]).trim())
        .map((r, i) => ({
          name: String(r[nameCol]).trim(),
          quantity: qtyCol ? (parseInt(r[qtyCol]) || 1) : 1,
          sortOrder: sortCol ? (parseInt(r[sortCol]) || (i + 1)) : (i + 1)
        }));

      if (prizesData.length === 0) { showToast('沒有有效的獎品資料', 'error'); return; }

      const result = await Store.importPrizes(prizesData);
      _allPrizes = await Store.getPrizes();
      renderPrizes();

      showToast(`成功匯入 ${result.added} 項獎品`, 'success');
      if (result.errors.length) showToast(result.errors.slice(0,3).join('、'), 'error');

      _pendingPrizeFile = null;
      document.getElementById('prizeFileLabel').textContent = '尚未選擇檔案';
      document.getElementById('prizeDrop').classList.remove('has-file');
    } catch (e) {
      showToast('匯入失敗：' + e.message, 'error');
    }
  }

  // ─── Participants ────────────────────────────────────────
  function renderParticipantStats() {
    const total = _allParticipants.length;
    const eligible = _allParticipants.filter(p => p.eligible).length;
    const won = total - eligible;
    document.getElementById('participantStats').innerHTML = `
      <div class="stat-card"><div class="num">${total}</div><div class="label">總人數</div></div>
      <div class="stat-card"><div class="num">${eligible}</div><div class="label">可抽人數</div></div>
      <div class="stat-card"><div class="num">${won}</div><div class="label">已中獎</div></div>
    `;
  }

  function filterParticipants() {
    const q = document.getElementById('pSearch').value.toLowerCase();
    const filtered = q
      ? _allParticipants.filter(p =>
          p.name.includes(q) || p.department.includes(q) || (p.employee_no || '').toLowerCase().includes(q))
      : _allParticipants;
    renderParticipantTable(filtered);
  }

  function renderParticipants() { filterParticipants(); }

  function renderParticipantTable(list) {
    document.getElementById('participantTable').innerHTML = list.map(p => {
      if (p.id === _editingParticipantId) {
        return `<tr class="editing">
          <td><input class="inline-edit-input" id="ep_name" value="${escHtml(p.name)}" style="width:100px"></td>
          <td><input class="inline-edit-input" id="ep_dept" value="${escHtml(p.department)}" style="width:130px"></td>
          <td><input class="inline-edit-input" id="ep_empno" value="${escHtml(p.employee_no||'')}" style="width:80px"></td>
          <td>${p.eligible ? '<span class="badge badge-green">可抽</span>' : '<span class="badge badge-red">已中獎</span>'}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick="saveEditParticipant('${p.id}')">儲存</button>
            <button class="btn btn-outline btn-sm" onclick="cancelEdit()">取消</button>
          </td>
        </tr>`;
      }
      return `<tr style="${!p.eligible ? 'background:#fff8e1' : ''}">
        <td>${escHtml(p.name)}</td>
        <td>${escHtml(p.department)}</td>
        <td>${escHtml(p.employee_no || '—')}</td>
        <td>${p.eligible
          ? '<span class="badge badge-green">可抽</span>'
          : '<span class="badge badge-red">已中獎</span>'}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="startEditParticipant('${p.id}')">編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deleteParticipant('${p.id}')">刪除</button>
        </td>
      </tr>`;
    }).join('');
  }

  async function addParticipant() {
    const name = document.getElementById('pName').value.trim();
    const dept = document.getElementById('pDept').value.trim();
    const empNo = document.getElementById('pEmpNo').value.trim();
    if (!name || !dept) { showToast('姓名和部門為必填', 'error'); return; }
    try {
      await Store.addParticipant(name, dept, empNo);
      document.getElementById('pName').value = '';
      document.getElementById('pDept').value = '';
      document.getElementById('pEmpNo').value = '';
      _allParticipants = await Store.getParticipants();
      renderParticipantStats();
      renderParticipants();
      showToast(`已新增：${name}`, 'success');
    } catch (e) {
      showToast('新增失敗：' + e.message, 'error');
    }
  }

  function startEditParticipant(id) {
    _editingParticipantId = id;
    renderParticipants();
    setTimeout(() => document.getElementById('ep_name')?.focus(), 50);
  }

  async function saveEditParticipant(id) {
    const name = document.getElementById('ep_name').value.trim();
    const dept = document.getElementById('ep_dept').value.trim();
    const empNo = document.getElementById('ep_empno').value.trim();
    if (!name || !dept) { showToast('姓名和部門為必填', 'error'); return; }
    try {
      await Store.updateParticipant(id, { name, department: dept, employee_no: empNo });
      _editingParticipantId = null;
      _allParticipants = await Store.getParticipants();
      renderParticipants();
      showToast('已更新', 'success');
    } catch (e) {
      showToast('更新失敗：' + e.message, 'error');
    }
  }

  function cancelEdit() {
    _editingParticipantId = null;
    _editingPrizeId = null;
    renderParticipants();
    renderPrizes();
  }

  async function deleteParticipant(id) {
    const p = _allParticipants.find(x => x.id === id);
    const name = p ? p.name : id;
    if (!confirm(`確定刪除「${name}」？`)) return;
    try {
      await Store.deleteParticipant(id);
      _allParticipants = await Store.getParticipants();
      renderParticipantStats();
      renderParticipants();
      showToast(`已刪除：${name}`, 'success');
    } catch (e) {
      showToast('刪除失敗：' + e.message, 'error');
    }
  }

  async function clearEligible() {
    if (!confirm('確定清除所有未中獎人員？此操作無法復原。')) return;
    const eligible = _allParticipants.filter(p => p.eligible);
    for (const p of eligible) await Store.deleteParticipant(p.id);
    _allParticipants = await Store.getParticipants();
    renderParticipantStats();
    renderParticipants();
    showToast('已清除未中獎人員', 'success');
  }

  async function clearAllData() {
    if (!confirm('⚠️ 確定清空全部資料（人員、獎品、中獎紀錄）？此操作無法復原。')) return;
    if (!confirm('再次確認：清空後所有資料將永久刪除。繼續？')) return;
    await Store.clearAll();
    _allParticipants = [];
    _allPrizes = [];
    renderParticipantStats();
    renderParticipants();
    renderPrizes();
    showToast('已清空全部資料', 'success');
  }

  // ─── Prizes ──────────────────────────────────────────────
  function renderPrizes() {
    document.getElementById('prizeTable').innerHTML = _allPrizes.map(p => {
      if (p.id === _editingPrizeId) {
        return `<tr class="editing">
          <td><input class="inline-edit-input" id="ep_sort" type="number" min="1" value="${p.sort_order}" style="width:60px"></td>
          <td><input class="inline-edit-input" id="ep_pname" value="${escHtml(p.name)}" style="width:160px"></td>
          <td><input class="inline-edit-input" id="ep_qty" type="number" min="${p.winners_drawn||1}" value="${p.quantity}" style="width:60px"></td>
          <td>${p.winners_drawn} / ${p.quantity}</td>
          <td>${p.active ? '<span class="badge badge-green">啟用</span>' : '<span class="badge badge-grey">停用</span>'}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick="saveEditPrize('${p.id}')">儲存</button>
            <button class="btn btn-outline btn-sm" onclick="cancelEdit()">取消</button>
          </td>
        </tr>`;
      }
      return `<tr>
        <td>${p.sort_order}</td>
        <td>${escHtml(p.name)}</td>
        <td>${p.quantity}</td>
        <td>${p.winners_drawn} / ${p.quantity}</td>
        <td>${p.active
          ? '<span class="badge badge-green">啟用</span>'
          : '<span class="badge badge-grey">停用</span>'}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="startEditPrize('${p.id}')">編輯</button>
          <button class="btn btn-danger btn-sm" onclick="deletePrize('${p.id}')">刪除</button>
        </td>
      </tr>`;
    }).join('');
  }

  async function addPrize() {
    const name = document.getElementById('prizeName').value.trim();
    const qty = document.getElementById('prizeQty').value;
    const sort = document.getElementById('prizeSortOrder').value;
    if (!name) { showToast('請填入獎品名稱', 'error'); return; }
    try {
      await Store.addPrize(name, qty, sort);
      document.getElementById('prizeName').value = '';
      document.getElementById('prizeQty').value = '1';
      _allPrizes = await Store.getPrizes();
      renderPrizes();
      showToast(`已新增：${name}`, 'success');
    } catch (e) {
      showToast('新增失敗：' + e.message, 'error');
    }
  }

  function startEditPrize(id) {
    _editingPrizeId = id;
    renderPrizes();
    setTimeout(() => document.getElementById('ep_pname')?.focus(), 50);
  }

  async function saveEditPrize(id) {
    const name = document.getElementById('ep_pname').value.trim();
    const qty = parseInt(document.getElementById('ep_qty').value);
    const sort = parseInt(document.getElementById('ep_sort').value);
    if (!name) { showToast('請填入獎品名稱', 'error'); return; }
    try {
      await Store.updatePrize(id, { name, quantity: qty, sort_order: sort });
      _editingPrizeId = null;
      _allPrizes = await Store.getPrizes();
      renderPrizes();
      showToast('已更新', 'success');
    } catch (e) {
      showToast('更新失敗：' + e.message, 'error');
    }
  }

  async function deletePrize(id) {
    const p = _allPrizes.find(x => x.id === id);
    const name = p ? p.name : id;
    if (!confirm(`確定刪除「${name}」？`)) return;
    try {
      const r = await Store.deletePrize(id);
      if (r.deactivated) showToast(`「${name}」已有中獎紀錄，已改為停用`, 'info');
      else showToast(`已刪除：${name}`, 'success');
      _allPrizes = await Store.getPrizes();
      renderPrizes();
    } catch (e) {
      showToast('刪除失敗：' + e.message, 'error');
    }
  }

  // ─── Results ─────────────────────────────────────────────
  async function loadResults() {
    const [results, logs] = await Promise.all([Store.getResults(), Store.getLogs()]);
    document.getElementById('resultsTable').innerHTML = results.map(r => `
      <tr class="${r.revoked ? 'revoked' : ''}">
        <td>${r.prize_name}</td>
        <td>${r.participant_name}</td>
        <td>${r.participant_dept}</td>
        <td>${r.participant_employee_no || '—'}</td>
        <td>${new Date(r.drawn_at).toLocaleString('zh-TW')}</td>
        <td>${r.revoked
          ? '<span class="badge badge-grey">已重抽</span>'
          : '<span class="badge badge-green">有效</span>'}</td>
        <td>${!r.revoked
          ? `<button class="btn btn-warning btn-sm" onclick="revokeResult('${r.id}','${r.participant_name}')">重抽</button>`
          : ''}</td>
      </tr>
    `).join('');
    document.getElementById('logsList').innerHTML = logs.map(l => `
      <div class="log-item">
        <span class="time">${new Date(l.created_at).toLocaleString('zh-TW')}</span>
        <span class="action">[${l.action}]</span>
        <span>${l.detail}</span>
      </div>
    `).join('');
  }

  async function revokeResult(id, name) {
    const reason = prompt(`重抽原因（${name}）`);
    if (reason === null) return;
    if (!reason.trim()) { showToast('請填入重抽原因', 'error'); return; }
    try {
      await Store.revoke(id, reason.trim());
      await loadResults();
      _allParticipants = await Store.getParticipants();
      renderParticipantStats();
      showToast(`已撤銷 ${name} 的中獎，可重新抽獎`, 'success');
    } catch (e) {
      showToast('重抽失敗：' + e.message, 'error');
    }
  }

  async function exportCsv() {
    try {
      const csv = await Store.exportResultsCsv();
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `中獎名單_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('CSV 已下載', 'success');
    } catch (e) {
      showToast('匯出失敗：' + e.message, 'error');
    }
  }
</script>
</body>
</html>
